name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -e ".[server,all]"
        pip install -e ./orchestra_science

    - name: Run database migrations
      run: |
        python -c "from orchestra.code_agent.db.migrations import MigrationEngine; MigrationEngine().apply()"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/horizon-orchestra/science
        tags: |
          type=raw,value=${{ inputs.environment }}
          type=sha,prefix=${{ inputs.environment }}-

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy summary
      run: |
        echo "✅ Deployed to **${{ inputs.environment }}**"
        echo "Tags pushed: ${{ steps.meta.outputs.tags }}"

name: test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, "feat/**"]
  workflow_dispatch:

jobs:
  # ── Middleware suite (strict) ─────────────────────────────────────────────
  # Must pass — this covers the new rate-limit work.
  middleware:
    name: middleware tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install redis "fakeredis[lua]" pytest pytest-asyncio

      - name: Run middleware tests
        env:
          REDIS_URL: redis://localhost:6379
        run: pytest tests/middleware -v --tb=short

  # ── Full suite (strict, forked to avoid shared-state pollution) ───────────
  # Runs every test in its own subprocess so module-level global state
  # (memory stores, registries) can't leak between tests.
  full-suite:
    name: full test suite (forked)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install redis "fakeredis[lua]" pytest pytest-asyncio pytest-forked

      - name: Run full test suite (forked per test)
        env:
          REDIS_URL: redis://localhost:6379
        run: pytest tests/ --forked --tb=short -q

  # ── Type-check (non-blocking) ─────────────────────────────────────────────
  # Middleware-only mypy pass. Informational; the wider codebase
  # isn't type-clean yet so we don't block PRs on it.
  typecheck:
    name: mypy (middleware)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + mypy
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install redis mypy

      - name: Type-check middleware
        # Only the 4 middleware files — the wider codebase isn't type-clean yet.
        # --follow-imports=skip prevents mypy from descending into router.py etc.
        run: |
          mypy \
            orchestra/middleware/rate_limit.py \
            orchestra/middleware/_lua.py \
            orchestra/middleware/_bucket.py \
            orchestra/middleware/_breaker.py \
            --ignore-missing-imports \
            --no-strict-optional \
            --follow-imports=skip

# Horizon Orchestra — CI/CD Pipeline
# Triggers: push to main/dev, pull requests

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Python: lint + type check + test ──────────────────────────────────────
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openai httpx pytest ruff mypy
          pip install -e "." 2>/dev/null || true

      - name: Lint (ruff)
        run: ruff check orchestra/ --select E,F,W --ignore E501

      - name: Type check (mypy)
        run: mypy orchestra/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  # ── TypeScript SDK: type check + build ────────────────────────────────────
  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci 2>/dev/null || npm install

      - name: Type check + build
        working-directory: sdk
        run: npx tsc --noEmit

  # ── Node.js backend: type check + build ───────────────────────────────────
  node-backend:
    name: Node.js Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: node
        run: npm ci 2>/dev/null || npm install

      - name: Type check + build
        working-directory: node
        run: npx tsc --noEmit

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python, typescript-sdk, node-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: horizon-orchestra:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Integration smoke test ────────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install openai httpx pytest

      - name: Full import smoke test
        run: |
          cd ${{ github.workspace }}
          python -c "
          import importlib, os
          failures = []
          for root, dirs, files in os.walk('orchestra'):
              for f in files:
                  if f.endswith('.py') and '__pycache__' not in root:
                      mod = os.path.join(root, f).replace('/', '.').replace('.py', '')
                      try:
                          importlib.import_module(mod)
                      except Exception as e:
                          failures.append(f'{mod}: {e}')
          if failures:
              print('FAILURES:')
              for f in failures:
                  print(f'  {f}')
              exit(1)
          print('All modules import cleanly')
          "

      - name: Run full test suite
        run: pytest tests/ -v --tb=short

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python tests (3.11 / 3.12 / 3.13) ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -e ".[dev,server]"

    - name: Install orchestra_science
      run: pip install -e ./orchestra_science

    - name: Type check (non-blocking)
      run: |
        pip install mypy
        mypy orchestra/ --ignore-missing-imports || true

    - name: Test with pytest
      run: |
        pip install pytest pytest-asyncio pytest-cov
        python -m pytest -x -q --cov=orchestra --cov-report=xml

    - name: Upload coverage
      if: matrix.python-version == '3.13'
      uses: codecov/codecov-action@v4
      with:
        files: coverage.xml
        fail_ci_if_error: false

  # ── Science tests ────────────────────────────────────────────────────────────
  science-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -e ".[server,all]"
        pip install -e ./orchestra_science

    - name: Test with pytest (science)
      run: |
        pip install pytest pytest-asyncio
        python -m pytest tests/test_orchestra_science/ -v --tb=short -q

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install ruff
      run: |
        pip install --upgrade pip
        pip install ruff

    - name: Lint
      run: ruff check orchestra/ src/

    - name: Format check
      run: ruff format --check orchestra/ src/

  # ── Terraform validate ───────────────────────────────────────────────────────
  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform

    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "~1.8"

    - name: terraform fmt check
      run: terraform fmt -check -recursive

    - name: terraform init (no backend)
      run: terraform init -backend=false

    - name: terraform validate
      run: terraform validate

    - name: Install tflint
      uses: terraform-linters/setup-tflint@v4

    - name: tflint
      run: |
        tflint --init
        tflint --format compact

  # ── Build Docker image ───────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/orchestra
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=sha,prefix=sha-

    - name: Login to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build (and push on main)
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        # Export locally for scanning even on PRs
        load: ${{ github.ref != 'refs/heads/main' }}

  # ── Container security scan (Trivy) ─────────────────────────────────────────
  container-scan:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image for scanning
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: orchestra:scan
        cache-from: type=gha

    - name: Trivy — scan for CVEs
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: orchestra:scan
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        exit-code: "1"       # fail on CRITICAL/HIGH
        ignore-unfixed: true # skip vulns without a fix available

    - name: Upload Trivy SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-results.sarif

  # ── Generate SBOM ────────────────────────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install cyclonedx-bom
      run: pip install cyclonedx-bom

    - name: Generate SBOM (CycloneDX JSON)
      run: |
        pip install -e ".[server]" -q
        cyclonedx-py environment -o sbom.json --format json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ github.sha }}
        path: sbom.json
        retention-days: 90

  # ── Deploy + smoke test ──────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [test, science-test, lint, terraform-validate, container-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production     # requires manual approval in GitHub Environments

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/orchestra
        tags: |
          type=raw,value=latest
          type=sha,prefix=sha-

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Smoke test — wait for health
      run: |
        docker run -d --name smoke -p 8000:8000 \
          -e ORCHESTRA_ENV=production \
          -e JWT_SECRET=smoketest-secret-not-real \
          ghcr.io/${{ github.repository_owner }}/orchestra:latest
        for i in $(seq 1 20); do
          if curl -sf http://localhost:8000/api/health; then
            echo "Server healthy"; break
          fi
          echo "Waiting… ($i/20)"; sleep 3
        done
        curl -sf http://localhost:8000/api/health || (docker logs smoke; exit 1)
        docker stop smoke

{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestra.fullname" . }}-ollama
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "orchestra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "orchestra.labels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: {{ .Values.ollama.keepAlive | quote }}
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          startupProbe:
            exec:
              command: ["curl", "-sf", "http://localhost:11434/api/tags"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["curl", "-sf", "http://localhost:11434/api/tags"]
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
      volumes:
        - name: models
          {{- if .Values.ollama.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "orchestra.fullname" . }}-ollama
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}

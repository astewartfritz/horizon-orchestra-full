apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestra.fullname" . }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      {{- include "orchestra.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "orchestra.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "orchestra.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "orchestra.fullname" . }}-config
          {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          {{- with .Values.extraEnvSecrets }}
            - secretRef:
                name: {{ . }}
          {{- end }}
          env:
            - name: OTEL_ENABLED
              value: {{ .Values.extraEnv.OTEL_ENABLED | quote }}
            {{- if .Values.extraEnv.OTEL_EXPORTER_OTLP_ENDPOINT }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.extraEnv.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            {{- end }}
            {{- if .Values.extraEnv.LANGFUSE_HOST }}
            - name: LANGFUSE_HOST
              value: {{ .Values.extraEnv.LANGFUSE_HOST | quote }}
            - name: LANGFUSE_PUBLIC_KEY
              value: {{ .Values.extraEnv.LANGFUSE_PUBLIC_KEY | quote }}
            - name: LANGFUSE_SECRET_KEY
              value: {{ .Values.extraEnv.LANGFUSE_SECRET_KEY | quote }}
            {{- end }}
          {{- with .Values.extraEnvSecrets }}
          envFrom:
            - secretRef:
                name: {{ . }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "orchestra.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

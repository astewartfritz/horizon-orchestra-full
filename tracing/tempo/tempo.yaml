# ── Tempo Configuration ──────────────────────────
# Stores traces and serves them to Jaeger + Grafana

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 10

querier:
  frontend_worker:
    frontend_address: tempo:9095

query_frontend:
  max_outstanding_per_tenant: 100
  search:
    max_duration: 168h
    query_ingesters_until: 30m

metrics_generator:
  registry:
    collection_interval: 15s
  storage:
    path: /tmp/tempo/generator
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
